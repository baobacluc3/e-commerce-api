# docker-compose.yml (đặt ở root project)
version: '3.8'

services:
  api:
    build: .
    container_name: ecommerce_api
    ports:
      - '3000:3000'
    volumes:
      - .:/app # sync code thật vào container
      - /app/node_modules # giữ node_modules của container
    environment:
      - NODE_ENV=development
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy # chờ postgres sẵn sàng mới start api
    command: npm run start:dev

  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres
    ports:
      - '5432:5432' # expose ra máy thật để dùng pgAdmin
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
